# SAC (Soft Actor-Critic) for Aerial Gym position setpoint task.
# Common spec: 128-128-64 ReLU (Jetson Nano), reward_scale 0.1, max_epochs 400.
# See paper/docs/experiments/baseline_algorithm_common_spec.md
# Run: python runner.py --file=sac_aerial_quad.yaml --task=position_setpoint_task --num_envs=4096 --headless --use_warp
params:
  seed: 8
  algo:
    name: sac

  model:
    name: soft_actor_critic

  load_checkpoint: False

  network:
    name: soft_actor_critic
    separate: True
    space:
      continuous:
    # Jetson Nano / baseline common spec (same as PPO, TD3, etc.)
    mlp:
      units: [128, 128, 64]
      activation: relu
      initializer:
        name: default
    log_std_bounds: [-5, 2]

  config:
    name: sac_aerial_quad
    env_name: position_setpoint_task
    normalize_input: False
    mixed_precision: False
    reward_shaper:
      scale_value: 0.1
    max_epochs: 400
    max_frames: -1
    num_steps_per_episode: 1
    save_best_after: 50
    save_frequency: 50
    gamma: 0.99
    init_alpha: 1.0
    alpha_lr: 3e-4
    actor_lr: 3e-4
    critic_lr: 1e-3
    critic_tau: 5e-3
    batch_size: 256
    learnable_temperature: True
    num_updates_per_step: 1
    policy_frequency: 2
    num_warmup_frames: 10000
    replay_buffer_size: 100000
    num_actors: 4096

    env_config:
      num_envs: 4096

    player:
      render: True
      deterministic: True
      games_num: 100
