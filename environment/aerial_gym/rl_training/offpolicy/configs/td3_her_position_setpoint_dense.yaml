experiment:
  name: td3_her_position_setpoint_dense
  seed: 8

algo:
  name: td3

env:
  task_name: position_setpoint_task
  env_name: forest_env
  robot_name: x500_with_camera_lowres
  controller_name: lee_attitude_control
  observation_dim: 77
  goal_dim: 3
  action_dim: 4
  episode_len_steps: 300
  use_depth_obs: true
  depth_cnn_latent_dim: 64
  success_threshold: 0.5
  success_reward: 1.0
  collision_penalty: -20.0

network:
  hidden_sizes: [128, 128, 64]
  activation: relu

train:
  device: cuda:0
  num_envs: 32
  headless: true
  use_warp: true
  total_env_steps: 819200
  warmup_env_steps: 20480
  batch_size: 256
  replay_buffer_size: 250000
  gradient_steps_per_iter: 2
  reward_scale: 0.1
  save_every_env_steps: 102400
  log_every_sec: 15
  max_completed_episodes: 4096

her:
  enabled: true
  strategy: future
  k: 4

td3:
  actor_lr: 0.0003
  critic_lr: 0.0003
  gamma: 0.99
  tau: 0.005
  policy_delay: 2
  policy_noise: 0.2
  noise_clip: 0.5
  exploration_noise: 0.1

sac:
  actor_lr: 0.0003
  critic_lr: 0.001
  alpha_lr: 0.0003
  init_alpha: 0.1
  gamma: 0.99
  tau: 0.005
  log_std_bounds: [-5, 2]
  min_alpha: 0.0001

tdm:
  actor_lr: 0.0003
  critic_lr: 0.0003
  gamma: 1.0
  tau: 0.005
  policy_delay: 2
  exploration_noise: 0.1
  max_horizon: 25

crl:
  actor_lr: 0.0003
  critic_lr: 0.0003
  latent_dim: 64
  temperature: 0.1
  exploration_noise: 0.1
